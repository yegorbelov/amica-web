name: Build & Push Frontend

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/amica-web:latest
          # Stable key: reuse cache when only app code changes (not Dockerfile/deps).
          cache-from: type=gha,key=buildx-amica-web-${{ hashFiles('Dockerfile', 'package.json', 'pnpm-lock.yaml') }}
          cache-to: type=gha,mode=max,key=buildx-amica-web-${{ hashFiles('Dockerfile', 'package.json', 'pnpm-lock.yaml') }}
          provenance: false
          sbom: false
